---
layout: default
---
<article class="post">
  <header class="post-header">
    <span class="post-meta">{{ page.date | date: "%b %-d, %Y" }}</span>
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <nav class="post-nav">
    {%- if page.next -%}
    <a class="post-nav-prev" href="{{ page.next.url | relative_url }}">&larr; {{ page.next.title | escape }}</a>
    {%- endif -%}
    {%- if page.previous -%}
    <a class="post-nav-next" href="{{ page.previous.url | relative_url }}">{{ page.previous.title | escape }} &rarr;</a>
    {%- endif -%}
  </nav>
</article>
