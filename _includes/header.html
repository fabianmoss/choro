<header class="site-header" role="banner">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape | replace: "of Brazilian", "<wbr>of Brazilian" }}</a>
    <nav class="site-nav">
      {%- assign sorted_pages = site.pages | where_exp: "item", "item.menu_order" | sort: "menu_order" -%}
      {%- for my_page in sorted_pages -%}
        {%- if my_page.title -%}
        <a class="page-link{% if page.url == my_page.url %} active{% endif %}" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
        {%- endif -%}
      {%- endfor -%}
    </nav>
  </div>
</header>
