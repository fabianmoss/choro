<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>
  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <p class="p-name footer-title">{{ site.title | escape }}</p>
        <p><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        {%- if site.github_username -%}
        <p><a href="https://github.com/{{ site.github_username }}" target="_blank"><svg class="svg-icon"><use xlink:href="{{ "/assets/minima-social-icons.svg#github" | relative_url }}"></use></svg> {{ site.github_username }}</a></p>
        {%- endif -%}
      </div>
      <div class="footer-col footer-col-2 footer-logo">
        <a href="https://www.uni-wuerzburg.de" target="_blank">
          <img src="{{ "/static/uni-wuerzburg.png" | relative_url }}" alt="Julius-Maximilians-Universität Würzburg">
        </a>
      </div>
    </div>
  </div>
</footer>
