---
layout: page
title: News
menu_order: 3
---

<ul class="post-list">
  {%- for post in site.posts -%}
  <li>
    <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
    <h3>
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </h3>
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
  </li>
  {%- endfor -%}
</ul>
